<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>hey...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;500&display=swap');

  :root {
    --bg: #0d0f1a;
    --card: #141626;
    --card-border: rgba(255,180,220,0.12);
    --pink: #ff6eb4;
    --pink-glow: rgba(255,110,180,0.35);
    --blue: #6eb4ff;
    --text: #f0e6ff;
    --muted: rgba(240,230,255,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── Starfield ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.4); }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 1;
    width: min(400px, 92vw);
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 32px;
    padding: 48px 36px 40px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,110,180,0.08), 0 24px 64px rgba(0,0,0,0.5);
    animation: rise 0.7s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Face ── */
  .face {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 16px;
    transition: all 0.4s ease;
    filter: drop-shadow(0 0 12px var(--pink-glow));
  }

  /* ── Question ── */
  #question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.25rem, 5vw, 1.55rem);
    color: var(--text);
    line-height: 1.4;
    min-height: 3em;
    transition: all 0.5s ease;
  }

  /* ── Sub-message ── */
  #respond {
    font-size: 0.9rem;
    color: var(--muted);
    min-height: 1.4em;
    margin-top: 10px;
    transition: all 0.4s ease;
    font-style: italic;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 24px;
    margin-top: 32px;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.4s ease;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.35s cubic-bezier(0.34,1.4,0.64,1);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* YES button — grows over time */
  #btnYes {
    font-size: 1.05rem;
    padding: 13px 36px;
    background: linear-gradient(135deg, #ff6eb4, #ff3d8c);
    color: #fff;
    box-shadow: 0 4px 24px var(--pink-glow);
    transform-origin: center bottom;
  }
  #btnYes:hover { transform: scale(1.06) translateY(-2px); }
  #btnYes:active { transform: scale(0.96); }

  /* NO button — shrinks and gets sadder */
  #btnNo {
    font-size: 1.05rem;
    padding: 13px 36px;
    background: rgba(255,255,255,0.07);
    color: rgba(240,230,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    transform-origin: center bottom;
    position: relative;
    overflow: visible;
  }

  /* Tear drops */
  .tear {
    position: absolute;
    width: 5px;
    border-radius: 0 0 50% 50%;
    background: linear-gradient(180deg, #a8d8ff, #5bb3ff);
    top: 100%;
    animation: tearFall 0.9s ease-in forwards;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes tearFall {
    0%   { height: 0; opacity: 1; }
    40%  { height: 14px; opacity: 1; }
    100% { height: 22px; opacity: 0; transform: translateY(18px) scaleX(0.6); }
  }

  /* Drip melting effect */
  .drip {
    position: absolute;
    bottom: -2px;
    width: 8px;
    height: 0;
    background: rgba(255,255,255,0.07);
    border-radius: 0 0 50% 50%;
    animation: drip 0.7s ease-out forwards;
    pointer-events: none;
  }
  @keyframes drip {
    0%   { height: 0; opacity: 1; }
    60%  { height: 14px; opacity: 0.8; }
    100% { height: 20px; opacity: 0; }
  }

  /* Puddle under No */
  .puddle {
    width: 0px;
    height: 5px;
    background: rgba(120,160,255,0.25);
    border-radius: 50%;
    margin-top: 4px;
    transition: width 0.5s ease;
    align-self: center;
  }

  /* Heart burst on Yes grow */
  .heart-burst {
    position: absolute;
    pointer-events: none;
    font-size: 1.2rem;
    animation: burstUp 0.8s ease-out forwards;
    z-index: 20;
  }
  @keyframes burstUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.5); }
    100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
  }

  /* Shake animation */
  @keyframes nopeSh {
    0%,100% { transform: rotate(0deg) scale(var(--no-scale,1)); }
    20%     { transform: rotate(-4deg) scale(var(--no-scale,1)); }
    40%     { transform: rotate(4deg) scale(var(--no-scale,1)); }
    60%     { transform: rotate(-3deg) scale(var(--no-scale,1)); }
    80%     { transform: rotate(2deg) scale(var(--no-scale,1)); }
  }
  .shake { animation: nopeSh 0.45s ease both; }

  /* Final dissolve */
  @keyframes dissolve {
    0%   { opacity: 1; transform: scale(var(--no-scale,1)) translateY(0); filter: blur(0); }
    100% { opacity: 0; transform: scale(0.2) translateY(20px); filter: blur(8px); }
  }
  .dissolve { animation: dissolve 0.8s ease forwards; }

  /* Yes celebration */
  @keyframes yesPulse {
    0%,100% { box-shadow: 0 4px 24px var(--pink-glow); }
    50%      { box-shadow: 0 0 60px rgba(255,110,180,0.8), 0 0 100px rgba(255,110,180,0.4); }
  }

  /* Confetti */
  .confetti {
    position: fixed; pointer-events: none; z-index: 999;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* Final screen */
  #finalScreen {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #finalScreen.show {
    display: flex;
  }
  #finalScreen.visible {
    opacity: 1;
  }
  #finalScreen p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--text);
    text-align: center;
    padding: 0 24px;
  }
  #finalScreen .big-heart {
    font-size: 5rem;
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 24px var(--pink-glow));
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    30%     { transform: scale(1.18); }
    60%     { transform: scale(0.95); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card" id="card">
  <span class="face" id="face">🥺</span>
  <div id="question">Will you go on a date with me?</div>
  <div id="respond"></div>
  <div class="btn-row">
    <div class="btn-wrap" id="yesWrap">
      <button id="btnYes">Yes ♡</button>
    </div>
    <div class="btn-wrap" id="noWrap">
      <div class="puddle" id="puddle"></div>
      <button id="btnNo">No</button>
    </div>
  </div>
</div>

<div id="finalScreen">
  <div class="big-heart">💕</div>
  <p>yay!! i promise i'll make it worth it 🌙</p>
</div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── State ── */
  const face      = document.getElementById('face');
  const question  = document.getElementById('question');
  const respond   = document.getElementById('respond');
  const btnYes    = document.getElementById('btnYes');
  const btnNo     = document.getElementById('btnNo');
  const noWrap    = document.getElementById('noWrap');
  const yesWrap   = document.getElementById('yesWrap');
  const puddle    = document.getElementById('puddle');
  const finalScr  = document.getElementById('finalScreen');

  let noCount = 0;           // how many times No was touched
  const MAX_NO = 7;          // dissolves after this many

  // YES sizing steps
  const yesScales  = [1, 1.08, 1.17, 1.27, 1.38, 1.5, 1.65, 1.82];
  const noScales   = [1, 0.90, 0.80, 0.70, 0.58, 0.46, 0.34, 0];

  const pleas = [
    "c'mon... just one date 🥺",
    "i already made reservations...",
    "i practiced what to say and everything 😭",
    "my heart is literally melting rn",
    "ok i'm crying a little",
    "please... i'll buy dessert",
    "...the no button is disappearing btw",
  ];

  const faces = ['🥺','😢','😭','😭','💔','😩','🫠'];

  function growYes() {
    const s = yesScales[Math.min(noCount, yesScales.length-1)];
    btnYes.style.transform = `scale(${s})`;
    btnYes.style.boxShadow = `0 4px ${12 + noCount*8}px rgba(255,110,180,${0.3 + noCount*0.09})`;
    btnYes.style.fontSize = (1.05 + noCount * 0.04) + 'rem';

    // burst hearts from yes
    for (let i = 0; i < 2 + noCount; i++) {
      setTimeout(() => spawnHeart(), i * 80);
    }
  }

  function spawnHeart() {
    const yRect = btnYes.getBoundingClientRect();
    const h = document.createElement('span');
    h.className = 'heart-burst';
    h.textContent = ['💕','💗','💖','♡'][Math.floor(Math.random()*4)];
    h.style.left = (yRect.left + Math.random() * yRect.width) + 'px';
    h.style.top  = (yRect.top - 10) + 'px';
    h.style.position = 'fixed';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 900);
  }

  function shrinkNo() {
    const s = noScales[Math.min(noCount, noScales.length-1)];
    btnNo.style.cssText += `transform: scale(${s}); opacity: ${0.9 - noCount * 0.1};`;
    btnNo.style.setProperty('--no-scale', s);
    puddle.style.width = (noCount * 12) + 'px';
  }

  function spawnTears() {
    const rect = btnNo.getBoundingClientRect();
    const count = Math.min(noCount + 1, 5);
    for (let i = 0; i < count; i++) {
      const t = document.createElement('div');
      t.className = 'tear';
      t.style.left = (20 + Math.random() * 60) + '%';
      t.style.animationDelay = (i * 0.1) + 's';
      btnNo.appendChild(t);
      setTimeout(() => t.remove(), 1100);
    }
    // drips
    for (let i = 0; i < 2; i++) {
      const d = document.createElement('div');
      d.className = 'drip';
      d.style.left = (15 + Math.random() * 70) + '%';
      d.style.animationDelay = (i * 0.15) + 's';
      btnNo.appendChild(d);
      setTimeout(() => d.remove(), 900);
    }
  }

  function shakeNo() {
    btnNo.classList.remove('shake');
    void btnNo.offsetWidth;
    btnNo.classList.add('shake');
    setTimeout(() => btnNo.classList.remove('shake'), 500);
  }

  function onNoPressed() {
    if (noCount >= MAX_NO) return;
    noCount++;

    shakeNo();
    spawnTears();
    growYes();
    shrinkNo();

    face.textContent = faces[Math.min(noCount, faces.length-1)];
    respond.textContent = pleas[Math.min(noCount-1, pleas.length-1)];

    if (noCount >= MAX_NO) {
      // dissolve No completely
      setTimeout(() => {
        btnNo.classList.add('dissolve');
        setTimeout(() => {
          noWrap.style.display = 'none';
          respond.textContent = "looks like there's only one choice left 🌙";
          question.textContent = "the universe has spoken.";
          face.textContent = '✨';
        }, 850);
      }, 200);
    }
  }

  /* ── Touch & click on No ── */
  btnNo.addEventListener('click', onNoPressed);
  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault();
    onNoPressed();
  }, { passive: false });

  /* ── Desktop: hover also triggers ── */
  btnNo.addEventListener('mouseenter', () => {
    if (noCount < MAX_NO) spawnTears();
  });

  /* ── Yes ── */
  function onYesPressed() {
    launchConfetti();
    btnYes.style.animation = 'yesPulse 0.6s ease infinite';
    document.getElementById('card').style.transition = 'opacity 0.8s, transform 0.8s';
    document.getElementById('card').style.opacity = '0';
    document.getElementById('card').style.transform = 'scale(0.9)';
    setTimeout(() => {
      finalScr.classList.add('show');
      setTimeout(() => finalScr.classList.add('visible'), 50);
    }, 900);
  }

  btnYes.addEventListener('click', onYesPressed);
  btnYes.addEventListener('touchstart', (e) => {
    e.preventDefault();
    onYesPressed();
  }, { passive: false });

  /* ── Confetti ── */
  function launchConfetti() {
    const colors = ['#ff6eb4','#ffd93d','#6bcb77','#6eb4ff','#ff6b6b','#c77dff','#fff'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        const size = 6 + Math.random() * 8;
        c.style.cssText = `
          left:${10+Math.random()*80}vw; top:-10px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration:${1.8+Math.random()*2}s;
          animation-delay:${Math.random()*0.6}s;
          border-radius:${Math.random()>0.5?'50%':'2px'};
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 25);
    }
  }
</script>
</body>
</html>
